# dnsmasq config for Wi-Fi AP fallback (wlan0 in AP mode)
# Serves DHCP to clients connecting to the Pi-Drive hotspot

interface=wlan0
bind-dynamic
domain-needed
bogus-priv

dhcp-range=10.42.0.2,10.42.0.20,255.255.255.0,24h
dhcp-option=3,10.42.0.1
dhcp-option=6,10.42.0.1

# Redirect all DNS to Pi so captive portal detection works
address=/#/10.42.0.1

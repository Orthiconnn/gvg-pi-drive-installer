# DHCP server for USB network interfaces
# Serves DHCP on the bridge (br-usb) that spans all USB gadget interfaces
# Assigns IP to connected Windows/Mac computer

# Bridge interface (all USB gadget interfaces bridged here)
interface=br-usb

bind-interfaces
except-interface=lo
except-interface=wlan0
except-interface=eth0

dhcp-range=10.0.0.2,10.0.0.6,255.255.255.0,1h
dhcp-option=3   # no default gateway (don't mess with host's internet)
dhcp-option=6   # no DNS

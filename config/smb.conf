[global]
   workgroup = WORKGROUP
   server string = Pi-Drive
   netbios name = PI-DRIVE
   server role = standalone server
   log file = /var/log/samba/log.%m
   max log size = 50
   dns proxy = no
   map to guest = Bad User
   usershare allow guests = yes
   server min protocol = SMB2
   client min protocol = SMB2
   # Optimize for small device
   socket options = TCP_NODELAY IPTOS_LOWDELAY
   # Enable Apple extensions for better Mac compatibility
   vfs objects = fruit streams_xattr
   fruit:metadata = stream
   fruit:model = MacSamba
   fruit:posix_rename = yes
   fruit:veto_appledouble = no
   fruit:nfs_aces = no
   fruit:wipe_intentionally_left_blank_rfork = yes
   fruit:delete_empty_adfiles = yes

[PiDrive]
   comment = Pi-Drive Shared Storage
   path = /srv/pidrive
   browseable = yes
   writable = yes
   guest ok = yes
   create mask = 0666
   directory mask = 0777
   force user = drive
   force group = drive
   # Real-time: disable oplocks so changes are immediately visible
   oplocks = no
   level2 oplocks = no
   kernel oplocks = no
   # Performance
   strict sync = no
   sync always = no
